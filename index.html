<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTP Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h2>Connexion par code</h2>

  <input id="email" type="email" placeholder="Email" />
  <button id="sendCodeBtn">Envoyer le code</button>

  <br><br>

  <input id="code" type="text" placeholder="Code reçu par email" />
  <button id="verifyBtn">Valider le code</button>

  <p id="status">Prêt</p>

  <script>
    const SUPABASE_URL = "https://ymuoiyfyvqpxokndhsuz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LVVb8iWlaJAuMa4D_LLiYg_DTe2KpyY";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const statusEl = document.getElementById("status");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    document.getElementById("sendCodeBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      if (!email) {
        setStatus("Entre un email.");
        return;
      }

      setStatus("Envoi du code...");

      const { error } = await client.auth.signInWithOtp({
        email: email
      });

      if (error) {
        setStatus("Erreur : " + error.message);
        return;
      }

      setStatus("Code envoyé par email.");
    });

    document.getElementById("verifyBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const code = document.getElementById("code").value.trim();

      if (!email || !code) {
        setStatus("Entre l'email et le code.");
        return;
      }

      setStatus("Vérification...");

      const { error } = await client.auth.verifyOtp({
        email: email,
        token: code,
        type: "email"
      });

      if (error) {
        setStatus("Erreur : " + error.message);
        return;
      }

      setStatus("Connecté avec succès.");
    });
  </script>
</body>
</html>
