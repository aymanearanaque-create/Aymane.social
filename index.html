<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Test Supabase</h1>

  <input id="email" type="email" placeholder="Email" />
  <br><br>

  <input id="password" type="password" placeholder="Mot de passe" />
  <br><br>

  <button id="signupBtn">Créer compte</button>
  <button id="loginBtn">Se connecter</button>
  <button id="logoutBtn">Se déconnecter</button>

  <p id="status">Prêt</p>

  <script>
    const SUPABASE_URL = "https://ymuoiyfyvqpxokndhsuz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LVVb8iWlaJAuMa4D_LLiYg_DTe2KpyY";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const statusEl = document.getElementById("status");

    document.getElementById("signupBtn").addEventListener("click", async function () {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      statusEl.textContent = "Création du compte...";

      try {
        const { error } = await supabase.auth.signUp({
          email: email,
          password: password
        });

        if (error) {
          statusEl.textContent = "Erreur inscription : " + error.message;
          return;
        }

        statusEl.textContent = "Compte créé";
      } catch (e) {
        statusEl.textContent = "Erreur JS inscription : " + e.message;
      }
    });

    document.getElementById("loginBtn").addEventListener("click", async function () {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      statusEl.textContent = "Connexion...";

      try {
        const { error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) {
          statusEl.textContent = "Erreur connexion : " + error.message;
          return;
        }

        statusEl.textContent = "Connecté";
      } catch (e) {
        statusEl.textContent = "Erreur JS connexion : " + e.message;
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async function () {
      statusEl.textContent = "Déconnexion...";

      try {
        const { error } = await supabase.auth.signOut();

        if (error) {
          statusEl.textContent = "Erreur déconnexion : " + error.message;
          return;
        }

        statusEl.textContent = "Déconnecté";
      } catch (e) {
        statusEl.textContent = "Erreur JS déconnexion : " + e.message;
      }
    });
  </script>
</body>
</html>
