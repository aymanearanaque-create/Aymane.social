<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aymane Social - Messagerie</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .box {
      max-width: 700px;
      margin: 0 auto;
      background: #1b1b1b;
      border-radius: 16px;
      padding: 20px;
    }

    h1, h2 {
      margin-top: 0;
    }

    input, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      background: #6c5ce7;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .hidden {
      display: none;
    }

    .msg {
      background: #222;
      border-radius: 12px;
      padding: 12px;
      margin-top: 12px;
    }

    .small {
      color: #aaa;
      font-size: 13px;
    }

    .status {
      margin-top: 12px;
      color: #ffd166;
      min-height: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .topbar button {
      width: auto;
      padding: 10px 16px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div id="authView">
      <h1>Aymane Social</h1>
      <p>Inscription avec pseudo + messagerie par pseudo</p>

      <h2>Inscription</h2>
      <input id="signupUsername" placeholder="Pseudo (ex: aymane)" />
      <input id="signupEmail" type="email" placeholder="Email" />
      <input id="signupPassword" type="password" placeholder="Mot de passe" />
      <button id="signupBtn">Créer un compte</button>

      <h2>Connexion</h2>
      <input id="loginEmail" type="email" placeholder="Email" />
      <input id="loginPassword" type="password" placeholder="Mot de passe" />
      <button id="loginBtn">Se connecter</button>

      <div id="authStatus" class="status">Prêt</div>
    </div>

    <div id="appView" class="hidden">
      <div class="topbar">
        <div>
          <h1>Messagerie</h1>
          <div id="meInfo" class="small"></div>
        </div>
        <button id="logoutBtn">Déconnexion</button>
      </div>

      <h2>Envoyer un message</h2>
      <input id="receiverUsername" placeholder="Pseudo du destinataire" />
      <textarea id="messageContent" placeholder="Ton message..."></textarea>
      <button id="sendBtn">Envoyer</button>

      <div id="appStatus" class="status"></div>

      <h2>Messages</h2>
      <button id="refreshBtn">Actualiser</button>
      <div id="messagesList"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ymuoiyfyvqpxokndhsuz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LVVb8iWlaJAuMa4D_LLiYg_DTe2KpyY";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentProfile = null;

    const authView = document.getElementById("authView");
    const appView = document.getElementById("appView");
    const authStatus = document.getElementById("authStatus");
    const appStatus = document.getElementById("appStatus");
    const meInfo = document.getElementById("meInfo");
    const messagesList = document.getElementById("messagesList");

    function setAuthStatus(text) {
      authStatus.textContent = text;
    }

    function setAppStatus(text) {
      appStatus.textContent = text;
    }

    function showAuth() {
      authView.classList.remove("hidden");
      appView.classList.add("hidden");
    }

    function showApp() {
      authView.classList.add("hidden");
      appView.classList.remove("hidden");
    }

    async function loadMyProfile() {
      const { data, error } = await client
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .maybeSingle();

      if (error) {
        setAppStatus("Erreur profil : " + error.message);
        return;
      }

      currentProfile = data;
      meInfo.textContent = "Connecté : @" + currentProfile.username + " • " + currentUser.email;
    }

    async function signup() {
      const username = document.getElementById("signupUsername").value.trim().toLowerCase();
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;

      if (!username || !email || !password) {
        setAuthStatus("Remplis tous les champs.");
        return;
      }

      setAuthStatus("Création du compte...");

      const { data, error } = await client.auth.signUp({
        email,
        password
      });

      if (error) {
        setAuthStatus("Erreur inscription : " + error.message);
        return;
      }

      if (!data.user) {
        setAuthStatus("Compte créé, mais utilisateur introuvable.");
        return;
      }

      const { error: profileError } = await client.from("profiles").insert({
        id: data.user.id,
        username: username
      });

      if (profileError) {
        setAuthStatus("Erreur pseudo : " + profileError.message);
        return;
      }

      setAuthStatus("Compte créé. Connecte-toi maintenant.");
    }

    async function login() {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      if (!email || !password) {
        setAuthStatus("Entre email et mot de passe.");
        return;
      }

      setAuthStatus("Connexion...");

      const { error } = await client.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        setAuthStatus("Erreur connexion : " + error.message);
        return;
      }

      setAuthStatus("Connecté.");
    }

    async function logout() {
      await client.auth.signOut();
      currentUser = null;
      currentProfile = null;
      showAuth();
      setAuthStatus("Déconnecté.");
    }

    async function sendMessage() {
      const receiverUsername = document.getElementById("receiverUsername").value.trim().toLowerCase();
      const content = document.getElementById("messageContent").value.trim();

      if (!receiverUsername || !content) {
        setAppStatus("Entre le pseudo du destinataire et le message.");
        return;
      }

      if (!currentProfile) {
        setAppStatus("Profil non chargé.");
        return;
      }

      if (receiverUsername === currentProfile.username) {
        setAppStatus("Tu ne peux pas t'envoyer un message à toi-même.");
        return;
      }

      setAppStatus("Recherche du destinataire...");

      const { data: receiver, error: receiverError } = await client
        .from("profiles")
        .select("*")
        .eq("username", receiverUsername)
        .maybeSingle();

      if (receiverError) {
        setAppStatus("Erreur destinataire : " + receiverError.message);
        return;
      }

      if (!receiver) {
        setAppStatus("Pseudo introuvable.");
        return;
      }

      const { error } = await client.from("messages").insert({
        sender_id: currentUser.id,
        receiver_id: receiver.id,
        content: content
      });

      if (error) {
        setAppStatus("Erreur envoi : " + error.message);
        return;
      }

      document.getElementById("messageContent").value = "";
      setAppStatus("Message envoyé à @" + receiver.username);
      loadMessages();
    }

    async function loadMessages() {
      messagesList.innerHTML = "Chargement...";

      const { data, error } = await client
        .from("messages")
        .select("*")
        .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
        .order("created_at", { ascending: false });

      if (error) {
        messagesList.innerHTML = "Erreur chargement : " + error.message;
        return;
      }

      if (!data || data.length === 0) {
        messagesList.innerHTML = "<p>Aucun message.</p>";
        return;
      }

      const ids = [...new Set(data.flatMap(m => [m.sender_id, m.receiver_id]))];

      const { data: profiles } = await client
        .from("profiles")
        .select("id, username")
        .in("id", ids);

      const usernameMap = {};
      (profiles || []).forEach(p => {
        usernameMap[p.id] = p.username;
      });

      messagesList.innerHTML = "";

      data.forEach(msg => {
        const div = document.createElement("div");
        div.className = "msg";

        const senderName = usernameMap[msg.sender_id] || "inconnu";
        const receiverName = usernameMap[msg.receiver_id] || "inconnu";

        div.innerHTML = `
          <div class="small">De @${senderName} vers @${receiverName}</div>
          <div>${msg.content}</div>
          <div class="small">${new Date(msg.created_at).toLocaleString()}</div>
        `;

        messagesList.appendChild(div);
      });
    }

    client.auth.onAuthStateChange(async (_event, session) => {
      if (session && session.user) {
        currentUser = session.user;
        await loadMyProfile();
        showApp();
        await loadMessages();
      } else {
        showAuth();
      }
    });

    async function init() {
      const { data } = await client.auth.getSession();

      if (data.session && data.session.user) {
        currentUser = data.session.user;
        await loadMyProfile();
        showApp();
        await loadMessages();
      } else {
        showAuth();
      }
    }

    document.getElementById("signupBtn").addEventListener("click", signup);
    document.getElementById("loginBtn").addEventListener("click", login);
    document.getElementById("logoutBtn").addEventListener("click", logout);
    document.getElementById("sendBtn").addEventListener("click", sendMessage);
    document.getElementById("refreshBtn").addEventListener("click", loadMessages);

    init();
  </script>
</body>
</html>
