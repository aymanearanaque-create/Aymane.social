<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aymane Social - Messagerie</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0a0a0f;
      --card:#13131a;
      --card2:#1c1c28;
      --border:#2a2a3d;
      --accent:#7c6af7;
      --accent2:#f76a8a;
      --text:#f0eeff;
      --muted:#9896b8;
      --ok:#6af7c4;
      --err:#ff7b9c;
      --warn:#ffd166;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100vh;
      font-family:Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,106,247,.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(247,106,138,.12), transparent 28%),
        var(--bg);
      color:var(--text);
      padding:20px;
    }

    .box{
      max-width:760px;
      margin:0 auto;
      background:rgba(19,19,26,.96);
      border:1px solid var(--border);
      border-radius:24px;
      padding:24px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }

    h1{
      font-size:44px;
      line-height:1;
      margin-bottom:10px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }

    h2{
      margin:22px 0 10px;
      font-size:28px;
    }

    p.sub{
      color:var(--muted);
      margin-bottom:8px;
      line-height:1.5;
    }

    input, textarea, button{
      width:100%;
      margin-top:10px;
      padding:14px;
      border-radius:14px;
      border:1px solid var(--border);
      font-size:16px;
      box-sizing:border-box;
    }

    input, textarea{
      background:var(--card2);
      color:var(--text);
      outline:none;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    input:focus, textarea:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(124,106,247,.15);
    }

    button{
      background:linear-gradient(135deg,var(--accent),#6552f0);
      color:#fff;
      border:none;
      cursor:pointer;
      font-weight:800;
    }

    button.small{
      width:auto;
      padding:10px 14px;
      border-radius:12px;
      background:var(--card2);
      border:1px solid var(--border);
    }

    button:hover{opacity:.97}

    .hidden{display:none}

    .status{
      margin-top:14px;
      min-height:22px;
      color:var(--warn);
      white-space:pre-wrap;
    }

    .ok{color:var(--ok)}
    .err{color:var(--err)}

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:18px;
      padding-bottom:14px;
      border-bottom:1px solid var(--border);
    }

    .smalltxt{
      color:var(--muted);
      font-size:13px;
    }

    .msg{
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      margin-top:12px;
    }

    .msg .meta{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .msg .content{
      white-space:pre-wrap;
      line-height:1.5;
    }

    .row{
      display:flex;
      gap:10px;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .row button{
      flex:1;
      min-width:140px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div id="authView">
      <h1>Aymane Social</h1>
      <p class="sub">Inscription → Connexion → Choisir pseudo → Messagerie</p>
      <p class="sub">Le pseudo sert de destinataire pour les messages.</p>

      <h2>Inscription</h2>
      <input id="signupEmail" type="email" placeholder="Email" />
      <input id="signupPassword" type="password" placeholder="Mot de passe" />
      <button id="signupBtn">Créer un compte</button>

      <h2>Connexion</h2>
      <input id="loginEmail" type="email" placeholder="Email" />
      <input id="loginPassword" type="password" placeholder="Mot de passe" />
      <button id="loginBtn">Se connecter</button>

      <div id="authStatus" class="status">Prêt</div>
    </div>

    <div id="profileSetupView" class="hidden">
      <h1>Choisir ton pseudo</h1>
      <p class="sub">Ce pseudo sera visible et servira à recevoir des messages.</p>
      <input id="profileUsername" placeholder="Pseudo unique (ex: lwa3r)" />
      <button id="saveProfileBtn">Enregistrer le pseudo</button>
      <div id="profileStatus" class="status"></div>
    </div>

    <div id="appView" class="hidden">
      <div class="topbar">
        <div>
          <h1 style="font-size:34px;">Messagerie</h1>
          <div id="meInfo" class="smalltxt"></div>
        </div>
        <button id="logoutBtn" class="small">Déconnexion</button>
      </div>

      <h2>Envoyer un message</h2>
      <input id="receiverUsername" placeholder="Pseudo du destinataire" />
      <textarea id="messageContent" placeholder="Ton message..."></textarea>
      <button id="sendBtn">Envoyer</button>

      <div id="appStatus" class="status"></div>

      <div class="row">
        <button id="refreshBtn" class="small">Actualiser les messages</button>
      </div>

      <h2>Messages</h2>
      <div id="messagesList"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ymuoiyfyvqpxokndhsuz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LVVb8iWlaJAuMa4D_LLiYg_DTe2KpyY";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentProfile = null;

    const authView = document.getElementById("authView");
    const profileSetupView = document.getElementById("profileSetupView");
    const appView = document.getElementById("appView");

    const authStatus = document.getElementById("authStatus");
    const profileStatus = document.getElementById("profileStatus");
    const appStatus = document.getElementById("appStatus");
    const meInfo = document.getElementById("meInfo");
    const messagesList = document.getElementById("messagesList");

    function setStatus(el, text, type = "") {
      el.textContent = text || "";
      el.className = "status";
      if (type) el.classList.add(type);
    }

    function showOnly(view) {
      authView.classList.add("hidden");
      profileSetupView.classList.add("hidden");
      appView.classList.add("hidden");
      view.classList.remove("hidden");
    }

    async function signup() {
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;

      if (!email || !password) {
        setStatus(authStatus, "Remplis tous les champs.", "err");
        return;
      }

      if (password.length < 6) {
        setStatus(authStatus, "Le mot de passe doit contenir au moins 6 caractères.", "err");
        return;
      }

      setStatus(authStatus, "Création du compte...");

      try {
        const { error } = await client.auth.signUp({ email, password });

        if (error) {
          setStatus(authStatus, "Erreur inscription : " + error.message, "err");
          return;
        }

        setStatus(authStatus, "Compte créé. Connecte-toi maintenant.", "ok");
        document.getElementById("loginEmail").value = email;
        document.getElementById("loginPassword").value = password;
      } catch (e) {
        setStatus(authStatus, "Erreur JS inscription : " + e.message, "err");
      }
    }

    async function login() {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      if (!email || !password) {
        setStatus(authStatus, "Entre email et mot de passe.", "err");
        return;
      }

      setStatus(authStatus, "Connexion...");

      try {
        const { error } = await client.auth.signInWithPassword({ email, password });

        if (error) {
          setStatus(authStatus, "Erreur connexion : " + error.message, "err");
          return;
        }

        setStatus(authStatus, "Connecté.", "ok");
      } catch (e) {
        setStatus(authStatus, "Erreur JS connexion : " + e.message, "err");
      }
    }

    async function logout() {
      try {
        await client.auth.signOut();
        currentUser = null;
        currentProfile = null;
        showOnly(authView);
        setStatus(authStatus, "Déconnecté.", "ok");
      } catch (e) {
        setStatus(appStatus, "Erreur déconnexion : " + e.message, "err");
      }
    }

    async function loadMyProfile() {
      const { data, error } = await client
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .maybeSingle();

      if (error) {
        setStatus(profileStatus, "Erreur profil : " + error.message, "err");
        return false;
      }

      if (!data) {
        currentProfile = null;
        showOnly(profileSetupView);
        return false;
      }

      currentProfile = data;
      meInfo.textContent = "Connecté : @" + currentProfile.username + " • " + currentUser.email;
      showOnly(appView);
      return true;
    }

    async function saveProfile() {
      const username = document.getElementById("profileUsername").value.trim().toLowerCase();

      if (!username) {
        setStatus(profileStatus, "Entre un pseudo.", "err");
        return;
      }

      if (username.length < 3) {
        setStatus(profileStatus, "Le pseudo doit contenir au moins 3 caractères.", "err");
        return;
      }

      setStatus(profileStatus, "Enregistrement du pseudo...");

      try {
        const { error } = await client
          .from("profiles")
          .insert({
            id: currentUser.id,
            username: username
          });

        if (error) {
          setStatus(profileStatus, "Erreur pseudo : " + error.message, "err");
          return;
        }

        setStatus(profileStatus, "Pseudo enregistré.", "ok");
        await loadMyProfile();
        await loadMessages();
      } catch (e) {
        setStatus(profileStatus, "Erreur JS pseudo : " + e.message, "err");
      }
    }

    async function sendMessage() {
      const receiverUsername = document.getElementById("receiverUsername").value.trim().toLowerCase();
      const content = document.getElementById("messageContent").value.trim();

      if (!receiverUsername || !content) {
        setStatus(appStatus, "Entre le pseudo du destinataire et le message.", "err");
        return;
      }

      if (!currentProfile) {
        setStatus(appStatus, "Profil non chargé.", "err");
        return;
      }

      if (receiverUsername === currentProfile.username) {
        setStatus(appStatus, "Tu ne peux pas t'envoyer un message à toi-même.", "err");
        return;
      }

      setStatus(appStatus, "Recherche du destinataire...");

      try {
        const { data: receiver, error: receiverError } = await client
          .from("profiles")
          .select("*")
          .eq("username", receiverUsername)
          .maybeSingle();

        if (receiverError) {
          setStatus(appStatus, "Erreur destinataire : " + receiverError.message, "err");
          return;
        }

        if (!receiver) {
          setStatus(appStatus, "Pseudo introuvable.", "err");
          return;
        }

        const { error } = await client
          .from("messages")
          .insert({
            sender_id: currentUser.id,
            receiver_id: receiver.id,
            content: content
          });

        if (error) {
          setStatus(appStatus, "Erreur envoi : " + error.message, "err");
          return;
        }

        document.getElementById("messageContent").value = "";
        setStatus(appStatus, "Message envoyé à @" + receiver.username, "ok");
        await loadMessages();
      } catch (e) {
        setStatus(appStatus, "Erreur JS envoi : " + e.message, "err");
      }
    }

    async function loadMessages() {
      messagesList.innerHTML = "Chargement...";

      try {
        const { data, error } = await client
          .from("messages")
          .select("*")
          .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
          .order("created_at", { ascending: false });

        if (error) {
          messagesList.innerHTML = "Erreur chargement : " + error.message;
          return;
        }

        if (!data || data.length === 0) {
          messagesList.innerHTML = "<p>Aucun message.</p>";
          return;
        }

        const ids = [...new Set(data.flatMap(m => [m.sender_id, m.receiver_id]))];

        const { data: profiles, error: profilesError } = await client
          .from("profiles")
          .select("id, username")
          .in("id", ids);

        if (profilesError) {
          messagesList.innerHTML = "Erreur profils : " + profilesError.message;
          return;
        }

        const usernameMap = {};
        (profiles || []).forEach(p => {
          usernameMap[p.id] = p.username;
        });

        messagesList.innerHTML = "";

        data.forEach(msg => {
          const div = document.createElement("div");
          div.className = "msg";

          const senderName = usernameMap[msg.sender_id] || "inconnu";
          const receiverName = usernameMap[msg.receiver_id] || "inconnu";

          div.innerHTML = `
            <div class="meta">De @${senderName} vers @${receiverName}</div>
            <div class="content">${escapeHtml(msg.content)}</div>
            <div class="meta">${new Date(msg.created_at).toLocaleString()}</div>
          `;

          messagesList.appendChild(div);
        });
      } catch (e) {
        messagesList.innerHTML = "Erreur JS chargement : " + e.message;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    client.auth.onAuthStateChange(async (_event, session) => {
      if (session && session.user) {
        currentUser = session.user;
        const hasProfile = await loadMyProfile();
        if (hasProfile) {
          await loadMessages();
        }
      } else {
        showOnly(authView);
      }
    });

    async function init() {
      try {
        const { data } = await client.auth.getSession();

        if (data.session && data.session.user) {
          currentUser = data.session.user;
          const hasProfile = await loadMyProfile();
          if (hasProfile) {
            await loadMessages();
          }
        } else {
          showOnly(authView);
        }
      } catch (e) {
        setStatus(authStatus, "Erreur init : " + e.message, "err");
      }
    }

    document.getElementById("signupBtn").addEventListener("click", signup);
    document.getElementById("loginBtn").addEventListener("click", login);
    document.getElementById("logoutBtn").addEventListener("click", logout);
    document.getElementById("saveProfileBtn").addEventListener("click", saveProfile);
    document.getElementById("sendBtn").addEventListener("click", sendMessage);
    document.getElementById("refreshBtn").addEventListener("click", loadMessages);

    init();
  </script>
</body>
</html>
