<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Supabase Test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Test Supabase</h2>

<input id="email" placeholder="email"><br><br>
<input id="password" type="password" placeholder="password"><br><br>

<button onclick="create()">Créer compte</button>
<button onclick="login()">Connexion</button>
<button onclick="logout()">Logout</button>

<p id="status">Chargé</p>

<script>

const SUPABASE_URL = "https://ymuoiyfyvqpxokndhsuz.supabase.co";
const SUPABASE_KEY = "sb_publishable_LVVb8iWlaJAuMa4D_LLiYg_DTe2KpyY";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function setStatus(t){
document.getElementById("status").innerText = t;
}

async function create(){

setStatus("Création...");

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const {error} = await client.auth.signUp({
email: email,
password: password
});

if(error){
setStatus(error.message);
}else{
setStatus("Compte créé");
}

}

async function login(){

setStatus("Connexion...");

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const {error} = await client.auth.signInWithPassword({
email: email,
password: password
});

if(error){
setStatus(error.message);
}else{
setStatus("Connecté");
}

}

async function logout(){

await client.auth.signOut();
setStatus("Déconnecté");

}

</script>

</body>
</html>
